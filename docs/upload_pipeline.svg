<svg viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1724"/>
      <stop offset="100%" stop-color="#1a2540"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="760" height="720" fill="url(#bg2)" rx="12"/>

  <text x="380" y="34" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700" letter-spacing="1">Upload Pipeline — Data Flow</text>
  <line x1="120" y1="44" x2="640" y2="44" stroke="#334155" stroke-width="1"/>

  <!-- Step blocks -->
  <!-- 1 CSV Upload -->
  <rect x="280" y="56" width="200" height="38" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="71" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">STEP 1</text>
  <text x="380" y="86" text-anchor="middle" fill="#bae6fd" font-size="10">CSV Upload · Encoding Detection</text>

  <line x1="380" y1="94" x2="380" y2="114" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2 Profile -->
  <rect x="280" y="116" width="200" height="38" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="131" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">STEP 2</text>
  <text x="380" y="146" text-anchor="middle" fill="#bae6fd" font-size="10">build_dataset_profile()</text>

  <line x1="380" y1="154" x2="380" y2="174" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 Diamond: has date? -->
  <polygon points="380,176 460,206 380,236 300,206" fill="#1e3058" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="200" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Has Date</text>
  <text x="380" y="214" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Column?</text>

  <!-- YES branch -->
  <line x1="300" y1="206" x2="178" y2="206" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="238" y="199" text-anchor="middle" fill="#34d399" font-size="9">YES</text>
  <rect x="60" y="188" width="116" height="36" rx="7" fill="#064e3b" stroke="#34d399" stroke-width="1" filter="url(#sh2)"/>
  <text x="118" y="203" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">detect_date_column()</text>
  <text x="118" y="217" text-anchor="middle" fill="#a7f3d0" font-size="8.5">≥80% parse · &gt;1980</text>

  <!-- NO branch -->
  <line x1="460" y1="206" x2="582" y2="206" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrAmber)"/>
  <text x="521" y="199" text-anchor="middle" fill="#fbbf24" font-size="9">NO</text>
  <rect x="584" y="188" width="116" height="36" rx="7" fill="#422006" stroke="#fbbf24" stroke-width="1" filter="url(#sh2)"/>
  <text x="642" y="203" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="600">Groq llama-3.3-70b</text>
  <text x="642" y="217" text-anchor="middle" fill="#fde68a" font-size="8.5">pick_columns_with_groq()</text>

  <!-- Both rejoin -->
  <line x1="118" y1="224" x2="118" y2="262" stroke="#34d399" stroke-width="1.2"/>
  <line x1="118" y1="262" x2="280" y2="262" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrGreen)"/>
  <line x1="642" y1="224" x2="642" y2="262" stroke="#fbbf24" stroke-width="1.2"/>
  <line x1="642" y1="262" x2="480" y2="262" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arrAmber)"/>

  <!-- 4 detect target -->
  <rect x="280" y="250" width="200" height="26" rx="7" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.2" filter="url(#sh2)"/>
  <text x="380" y="267" text-anchor="middle" fill="#bae6fd" font-size="10">detect_target_column()</text>

  <line x1="380" y1="276" x2="380" y2="296" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: time-series or cross-sectional -->
  <polygon points="380,298 480,326 380,354 280,326" fill="#1e3058" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="320" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Dataset</text>
  <text x="380" y="334" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">Type?</text>

  <!-- Cross-sectional branch -->
  <line x1="480" y1="326" x2="600" y2="326" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrAmber)"/>
  <text x="540" y="319" text-anchor="middle" fill="#fbbf24" font-size="9">Cross-sectional</text>
  <rect x="602" y="308" width="126" height="36" rx="7" fill="#422006" stroke="#fbbf24" stroke-width="1" filter="url(#sh2)"/>
  <text x="665" y="323" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="600">_build_chart_data()</text>
  <text x="665" y="337" text-anchor="middle" fill="#fde68a" font-size="8.5">Plotly chart JSON</text>

  <!-- Time-series main path -->
  <line x1="380" y1="354" x2="380" y2="374" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="348" y="368" fill="#34d399" font-size="9">Time-series</text>

  <!-- run_forecast box -->
  <rect x="200" y="376" width="360" height="130" rx="9" fill="#0a2e1c" stroke="#10b981" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="394" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="700">run_forecast() — 8-Step Pipeline</text>
  <rect x="214" y="400" width="155" height="18" rx="4" fill="#064e3b"/>
  <text x="291" y="413" text-anchor="middle" fill="#a7f3d0" font-size="8.5">1. Detect Freq + Auto-resample</text>
  <rect x="375" y="400" width="172" height="18" rx="4" fill="#064e3b"/>
  <text x="461" y="413" text-anchor="middle" fill="#a7f3d0" font-size="8.5">2. CV Tuning + Log-transform</text>
  <rect x="214" y="422" width="155" height="18" rx="4" fill="#064e3b"/>
  <text x="291" y="435" text-anchor="middle" fill="#a7f3d0" font-size="8.5">3. Fit Prophet Model</text>
  <rect x="375" y="422" width="172" height="18" rx="4" fill="#064e3b"/>
  <text x="461" y="435" text-anchor="middle" fill="#a7f3d0" font-size="8.5">4. Compute Residuals</text>
  <rect x="214" y="444" width="155" height="18" rx="4" fill="#064e3b"/>
  <text x="291" y="457" text-anchor="middle" fill="#a7f3d0" font-size="8.5">5. LightGBM Q10/Q50/Q90</text>
  <rect x="375" y="444" width="172" height="18" rx="4" fill="#064e3b"/>
  <text x="461" y="457" text-anchor="middle" fill="#a7f3d0" font-size="8.5">6. Autoregressive Loop</text>
  <rect x="214" y="466" width="155" height="18" rx="4" fill="#064e3b"/>
  <text x="291" y="479" text-anchor="middle" fill="#a7f3d0" font-size="8.5">7. Inverse Log-transform</text>
  <rect x="375" y="466" width="172" height="18" rx="4" fill="#064e3b"/>
  <text x="461" y="479" text-anchor="middle" fill="#a7f3d0" font-size="8.5">8. SMAPE Validation</text>

  <line x1="380" y1="506" x2="380" y2="526" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Parallel outputs -->
  <rect x="30" y="528" width="155" height="36" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1" filter="url(#sh2)"/>
  <text x="107" y="543" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">compute_shap()</text>
  <text x="107" y="557" text-anchor="middle" fill="#a7f3d0" font-size="8.5">Top-5 Feature Drivers</text>

  <rect x="198" y="528" width="155" height="36" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1" filter="url(#sh2)"/>
  <text x="275" y="543" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">detect_anomalies()</text>
  <text x="275" y="557" text-anchor="middle" fill="#a7f3d0" font-size="8.5">IsolationForest + Band</text>

  <rect x="366" y="528" width="155" height="36" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1" filter="url(#sh2)"/>
  <text x="443" y="543" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">compute_truth_meter()</text>
  <text x="443" y="557" text-anchor="middle" fill="#a7f3d0" font-size="8.5">Green / Amber / Red</text>

  <rect x="534" y="528" width="155" height="36" rx="7" fill="#064e3b" stroke="#10b981" stroke-width="1" filter="url(#sh2)"/>
  <text x="611" y="543" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">_run_group_forecasts()</text>
  <text x="611" y="557" text-anchor="middle" fill="#a7f3d0" font-size="8.5">Top-5 Segments</text>

  <!-- Lines from run_forecast to parallel -->
  <line x1="380" y1="526" x2="107" y2="528" stroke="#10b981" stroke-width="1" marker-end="url(#arrGreen)"/>
  <line x1="380" y1="526" x2="275" y2="528" stroke="#10b981" stroke-width="1" marker-end="url(#arrGreen)"/>
  <line x1="380" y1="526" x2="443" y2="528" stroke="#10b981" stroke-width="1" marker-end="url(#arrGreen)"/>
  <line x1="380" y1="526" x2="611" y2="528" stroke="#10b981" stroke-width="1" marker-end="url(#arrGreen)"/>

  <!-- Converge to intelligence card -->
  <line x1="107" y1="564" x2="107" y2="598" stroke="#10b981" stroke-width="1"/>
  <line x1="275" y1="564" x2="275" y2="598" stroke="#10b981" stroke-width="1"/>
  <line x1="443" y1="564" x2="443" y2="598" stroke="#10b981" stroke-width="1"/>
  <line x1="611" y1="564" x2="611" y2="598" stroke="#10b981" stroke-width="1"/>
  <line x1="107" y1="598" x2="611" y2="598" stroke="#10b981" stroke-width="1"/>
  <line x1="380" y1="598" x2="380" y2="614" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Intelligence card + SQLite -->
  <rect x="220" y="616" width="320" height="32" rx="8" fill="#1c1208" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="380" y="630" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">build_dataset_intelligence_card()</text>
  <text x="380" y="643" text-anchor="middle" fill="#fde68a" font-size="8.5">Stored in SQLite · Reused by every chat without re-running ML</text>

  <!-- Cross-sectional path also goes to SQLite -->
  <line x1="665" y1="344" x2="665" y2="632" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="665" y1="632" x2="540" y2="632" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrAmber)"/>
</svg>
